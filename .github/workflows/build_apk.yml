name: Build Flutter APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze (show Dart errors)
        run: flutter analyze --no-fatal-infos || true

      - name: Get valid gradle-wrapper.jar from Flutter template
        run: |
          flutter create --platforms=android --org com.test --project-name tmpapp /tmp/tmpapp
          cp /tmp/tmpapp/android/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew
          file android/gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: List APK
        if: success()
        run: find build/app/outputs -name "*.apk" -ls

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kaam-dhanda-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7

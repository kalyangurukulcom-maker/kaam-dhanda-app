name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Gradle (for wrapper generation)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Generate Gradle Wrapper
        run: |
          mkdir -p android/gradle/wrapper
          cd android
          gradle wrapper --gradle-version 8.10.2 --distribution-type all
          chmod +x gradlew
          echo "=== Wrapper files ==="
          ls -la gradlew gradle/wrapper/

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: List APK output
        run: |
          echo "=== APK files ==="
          find build/app/outputs -name "*.apk" -ls 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kaam-dhanda-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7

name: Build Flutter APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze (show errors)
        run: flutter analyze --no-fatal-infos 2>&1 | tee /tmp/analyze.txt || true

      - name: Post analyze errors as comment
        run: |
          ERRORS=$(grep "error" /tmp/analyze.txt | head -30 | tr -d "\"")
          MSG=$(printf "Analyze errors:\n%s" "$ERRORS")
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d "{\"body\": \"${MSG}\"}" || true

      - name: Get valid gradle-wrapper.jar from Flutter template
        run: |
          flutter create --platforms=android --org com.test --project-name tmpapp /tmp/tmpapp
          cp /tmp/tmpapp/android/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Build Debug APK
        run: flutter build apk --debug --verbose 2>&1 | tail -60

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kaam-dhanda-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7

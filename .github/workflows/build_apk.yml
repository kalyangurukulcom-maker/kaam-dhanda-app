name: Build Flutter APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true
      - name: Flutter pub get
        run: flutter pub get
      - name: Fix Android build prerequisites
        run: |
          flutter create --platforms=android --org com.test --project-name tmpapp /tmp/tmpapp
          cp /tmp/tmpapp/android/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar
          sed -i 's/DEFAULT_JVM_OPTS=.*/DEFAULT_JVM_OPTS=""/' android/gradlew
          chmod +x android/gradlew
          cp -r /tmp/tmpapp/android/app/src/main/res/mipmap-* android/app/src/main/res/
          echo "res directory contents:"
          ls android/app/src/main/res/
      - name: Build Debug APK
        env:
          JAVA_TOOL_OPTIONS: '-Xmx1536m'
          GRADLE_OPTS: '-Dorg.gradle.daemon=false'
        run: flutter build apk --debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kaam-dhanda-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

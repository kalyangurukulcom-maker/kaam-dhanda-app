name: Build Kaam Dhanda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # Manual trigger button on GitHub

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java ─────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Setup Flutter ──────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      # ── 4. Firebase config — use secret if set, else use placeholder ──────
      - name: Set up google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
            echo "✅ Using real Firebase config from secret"
          else
            echo "ℹ️  Using placeholder Firebase config (demo mode)"
          fi

      # ── 5. Install dependencies ───────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 6. Build APK ──────────────────────────────────────────────────────
      - name: Build Release APK
        run: flutter build apk --release --no-shrink

      # ── 7. Rename APK ─────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/KaamDhanda_v1.apk

      # ── 8. Upload APK as artifact (download from GitHub Actions) ──────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KaamDhanda-APK
          path: build/app/outputs/flutter-apk/KaamDhanda_v1.apk
          retention-days: 30

      # ── 9. Show APK size ──────────────────────────────────────────────────
      - name: Show APK info
        run: |
          echo "✅ APK Build Complete!"
          ls -lh build/app/outputs/flutter-apk/

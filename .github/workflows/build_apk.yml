name: Build Flutter APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Get valid gradle-wrapper.jar from Flutter template
        run: |
          flutter create --platforms=android --org com.test --project-name tmpapp /tmp/tmpapp
          cp /tmp/tmpapp/android/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew
          file android/gradle/wrapper/gradle-wrapper.jar

      - name: Show android build files
        run: |
          echo "=== settings.gradle ==="
          cat android/settings.gradle
          echo "=== app/build.gradle ==="
          cat android/app/build.gradle
          echo "=== google-services.json ==="
          cat android/app/google-services.json || echo "MISSING"
          echo "=== gradlew executable? ==="
          ls -la android/gradlew
          echo "=== gradle-wrapper.jar type ==="
          file android/gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: |
          flutter build apk --debug --verbose 2>&1 | tee /tmp/build_log.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          
          LOG_TAIL=$(tail -150 /tmp/build_log.txt | sed 's/"/\\"/g' | tr '\n' '|' | sed 's/|/\\n/g')
          
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d "{\"body\": \"## Build Log (last 150 lines)\\n```\\n${LOG_TAIL}\\n```\"}"
          
          exit $BUILD_EXIT

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kaam-dhanda-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7

name: Build Flutter APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Gradle wrapper (valid JAR)
        run: |
          echo "=== Gradle version ==="
          gradle --version
          cd android
          gradle wrapper --gradle-version 8.10.2 --distribution-type all
          chmod +x gradlew
          echo "=== Wrapper files ==="
          ls -la gradle/wrapper/
          file gradle/wrapper/gradle-wrapper.jar

      - name: Show key Android files
        run: |
          echo "=== settings.gradle ==="
          cat android/settings.gradle
          echo "=== android/build.gradle ==="
          cat android/build.gradle
          echo "=== android/app/build.gradle ==="
          cat android/app/build.gradle
          echo "=== local.properties ==="
          cat android/local.properties 2>/dev/null || echo "NOT FOUND (Flutter will create it)"

      - name: Build Debug APK
        run: flutter build apk --debug --verbose

      - name: List APK output
        if: success()
        run: find build/app/outputs -name "*.apk" -ls

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kaam-dhanda-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7
